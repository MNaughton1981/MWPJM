<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Workboard mark: a bold sky-blue "W" formed by two upward chevrons
       inside a slate rounded square, with an amber accent dot pinned to
       the central peak. Reuses the app's slate / sky / amber palette so
       the home-screen tile feels native to the in-app chrome. -->
  <rect width="512" height="512" rx="96" fill="#0f172a"/>
  <!-- subtle inner frame for depth -->
  <rect x="64" y="64" width="384" height="384" rx="56"
        fill="none" stroke="#1e293b" stroke-width="6"/>
  <!-- the W: top-left → valley → central peak → valley → top-right -->
  <path d="M112 168 L196 344 L256 232 L316 344 L400 168"
        fill="none" stroke="#0ea5e9" stroke-width="44"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- amber accent dot at the central peak -->
  <circle cx="256" cy="232" r="22" fill="#facc15"/>
</svg>
