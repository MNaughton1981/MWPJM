<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Workboard mark.

    Concept: a workshop pegboard plate with a bold sky-blue checkmark
    in the foreground. Two-layer message:

      • The pegboard tile says "facilities / workbench / hands-on."
      • The checkmark says "tracked / done / closed out."

    Earlier iteration tried a crescent-wrench head terminating the
    upper stem of the check; at favicon and home-screen-tile size the
    wrench shape didn't read clearly, so we dropped it for a clean
    check. The pegboard plate is now medium-gray (slate-500) instead
    of the old near-black slate-800 — that gives the dark holes
    enough contrast to actually show up on a dark home screen.

    Palette stays on the existing slate / sky / amber so the home-
    screen tile and the in-app chrome remain visually consistent.
  -->
  <defs>
    <!-- Pegboard hole pattern: one 80x80 tile with a single dark hole.
         Tiled across the inset plate. Holes are slate-900 (same as
         the outer frame) so they read as "punched all the way through
         to the dark surface behind." Hole radius 14 (was 9) so they
         don't disappear at small icon sizes. -->
    <pattern id="pegboard-holes"
             x="16" y="16"
             width="80" height="80"
             patternUnits="userSpaceOnUse">
      <circle cx="40" cy="40" r="14" fill="#0f172a"/>
    </pattern>
  </defs>

  <!-- Outer slate frame (rounded square) — the home-screen surface
       and the dark backdrop the holes "punch through" to. -->
  <rect width="512" height="512" rx="96" fill="#0f172a"/>

  <!-- Inset pegboard plate. Medium gray (slate-500) so the dark
       holes have somewhere to contrast against. The earlier slate-800
       was too close to the slate-900 frame and the holes vanished. -->
  <rect x="48" y="48" width="416" height="416" rx="56" fill="#64748b"/>
  <!-- Hole pattern overlay -->
  <rect x="48" y="48" width="416" height="416" rx="56" fill="url(#pegboard-holes)"/>

  <!-- ===== Checkmark =====
       Classic check shape: short down-stroke from mid-left to a low
       valley, then a long up-stroke aimed at the upper-right corner.
       Stroke 60 (was 48) so the check is the unmistakable focal
       element even at favicon size. Sky-400 — brighter than the
       brand-600 used elsewhere in the UI, deliberately, because the
       icon needs to pop on a wide range of OS home-screen wallpapers. -->
  <path d="M112 282 L224 388 L408 148"
        fill="none"
        stroke="#38bdf8"
        stroke-width="60"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
