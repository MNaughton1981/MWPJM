<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Workboard mark.

    Concept: a workshop pegboard plate with a bold sky-blue checkmark
    in the foreground; the upper stem of the check terminates in an
    amber crescent-wrench head. Reads at three levels:

      • The pegboard tile says "facilities / workbench / hands-on."
      • The checkmark says "tracked / done / closed out."
      • The wrench head says "fix it" — turning the check into a
        maintenance icon rather than just a generic todo tick.

    Palette is the existing slate / sky / amber the rest of the app
    already uses, so the home-screen tile and the in-app chrome stay
    visually consistent.
  -->
  <defs>
    <!-- Pegboard hole pattern: one 80x80 tile with a single dark hole.
         Tiled across the inset plate to give the perforated workshop
         look without listing 25 individual circles. -->
    <pattern id="pegboard-holes"
             x="16" y="16"
             width="80" height="80"
             patternUnits="userSpaceOnUse">
      <circle cx="40" cy="40" r="9" fill="#020617"/>
    </pattern>
  </defs>

  <!-- Outer slate tile (rounded square) — the home-screen surface. -->
  <rect width="512" height="512" rx="96" fill="#0f172a"/>

  <!-- Inset pegboard plate, slightly lighter than the tile so it reads
       as the actual board hanging on the wall. -->
  <rect x="48" y="48" width="416" height="416" rx="56" fill="#1e293b"/>
  <!-- Hole pattern overlay -->
  <rect x="48" y="48" width="416" height="416" rx="56" fill="url(#pegboard-holes)"/>

  <!-- ===== Checkmark stroke =====
       Classic check shape: short down-stroke from mid-left to a low
       valley, then a long up-stroke aimed at the upper-right where the
       wrench head sits. The up-stroke stops 30-ish px short of the
       wrench head so the head reads as the terminus of the stroke,
       not a sticker on top of it. -->
  <path d="M132 282 L220 374 L342 198"
        fill="none"
        stroke="#0ea5e9"
        stroke-width="48"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- ===== Crescent wrench head =====
       Positioned at the visual tip of the upper stem and rotated to
       extend the up-stroke (~ -55deg from horizontal). Built from:
         • a rounded-rectangle body (the head + handle stub)
         • a V-notch on the leading edge (the adjustable jaw opening)
         • a small circle on the side (the worm-gear adjustment knob,
           which is what gives a crescent wrench its asymmetric
           silhouette and tells the eye "wrench" not "spanner") -->
  <g transform="translate(370 170) rotate(-55)">
    <!-- main rounded body, amber to pop against slate + sky -->
    <rect x="-30" y="-46" width="64" height="92" rx="14"
          fill="#facc15"
          stroke="#0f172a"
          stroke-width="5"/>
    <!-- jaw notch: cut a wedge out of the upper edge so the head
         visibly "opens" — this is what makes it read as a wrench -->
    <path d="M -10 -46 L 18 -46 L 18 -14 L 4 -28 L -10 -14 Z"
          fill="#0f172a"/>
    <!-- adjustment knob on the side -->
    <circle cx="-30" cy="6" r="11"
            fill="#facc15"
            stroke="#0f172a"
            stroke-width="5"/>
  </g>
</svg>
